<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aforo Piscina 2026</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/241/241528.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/241/241528.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #121212; color: #e0e0e0; font-family: -apple-system, sans-serif; }
        .card-main { background: #1e1e1e; border-radius: 20px; border: 1px solid #333; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; display: none; margin-bottom: 20px; background: #000; }
        .capacity-box { font-size: 3.5rem; font-weight: 800; color: #00d1ff; }
        .btn-qty { width: 60px; height: 60px; font-size: 1.5rem; border-radius: 12px; margin: 4px; font-weight: bold; }
        .btn-qty.active { background-color: #ffc107 !important; color: #000 !important; border-color: #ffc107 !important; }
        .step-panel { display: none; }
        .step-active { display: block; }
        .list-group-item { background: #2a2a2a; color: white; border: 1px solid #383838; margin-bottom: 8px; border-radius: 12px !important; cursor: pointer; }
        .badge-qty { font-size: 1.1rem; padding: 10px 15px; }
    </style>
</head>
<body>

<div class="container py-4 text-center">
    <div class="card-main p-3 mb-4 shadow-lg">
        <h6 class="text-uppercase text-secondary small">Aforo Piscina Hoy</h6>
        <div id="capacity-indicator" class="capacity-box">-- / --</div>
    </div>

    <div id="panel-start" class="step-panel step-active">
        <button onclick="openScanner()" class="btn btn-success w-100 py-4 shadow mb-4" style="font-size: 1.4rem; border-radius: 15px;">
            📥 ESCANEAR ENTRADA
        </button>
        
        <div class="text-start">
            <h6 class="text-secondary ps-2 text-uppercase small">Viviendas en el recinto:</h6>
            <div id="people-list" class="list-group mt-2"></div>
        </div>

        <div class="mt-5 pt-4 border-top border-secondary">
            <button onclick="confirmCierre()" class="btn btn-outline-warning w-100 py-3">
                🌙 FINALIZAR JORNADA (Reset)
            </button>
        </div>
    </div>

    <div id="panel-scan" class="step-panel">
        <h4 id="scan-title" class="mb-3 text-success">Escaneando código...</h4>
        <div id="reader"></div>
        <button onclick="goBack()" class="btn btn-outline-light w-100 py-3">Volver Atrás</button>
    </div>

    <div id="panel-confirm" class="step-panel">
        <div class="card-main p-4 shadow">
            <h4 class="text-info mb-1" id="scanned-id">---</h4>
            <p id="action-label" class="text-secondary text-uppercase small"></p>
            <hr class="border-secondary">
            
            <div id="qty-section">
                <p class="mb-2">¿Cuántas personas?</p>
                <div class="d-flex flex-wrap justify-content-center mb-3">
                    <script>
                        for(let i=1; i<=9; i++) {
                            document.write(`<button onclick="setQty(${i}, this)" class="btn btn-outline-primary btn-qty">${i}</button>`);
                        }
                    </script>
                </div>
                <input type="number" id="manual-qty" class="form-control form-control-lg text-center bg-dark text-white border-secondary mb-3" placeholder="Cantidad">
            </div>

            <div class="mb-4 text-start">
                <label class="small text-secondary mb-1">Notas / Incidencias:</label>
                <textarea id="observation" class="form-control bg-dark text-white border-secondary" rows="2"></textarea>
            </div>

            <div id="action-buttons"></div>
            <button onclick="goBack()" class="btn btn-link text-secondary mt-3 w-100">Cancelar</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
    // ⚠️ CAMBIA ESTO POR TU URL ⚠️
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxBKWW6jbhSBxGajkLiHKA88k-T8uO9XK13AfQqLxAi6giKydPuNzHPPVWXxyabFlI/exec";
    
    let html5QrCode = new Html5Qrcode("reader");
    let currentQR = "";

    function showPanel(id) {
        document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('step-active'));
        document.getElementById(id).classList.add('step-active');
    }

    function goBack() {
        if(html5QrCode.isScanning) html5QrCode.stop();
        showPanel('panel-start');
    }

    function openScanner() {
        document.getElementById('reader').style.display = 'block';
        showPanel('panel-scan');
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            currentQR = text.trim();
            html5QrCode.stop().then(() => {
                document.getElementById('reader').style.display = 'none';
                prepareConfirmation('entrada');
            });
        }).catch(err => alert("Error: " + err));
    }

    function manageHousehold(id, qtyInside) {
        currentQR = id.trim();
        document.getElementById('manual-qty').value = qtyInside;
        prepareConfirmation('gestion');
    }

    function prepareConfirmation(mode) {
        document.getElementById('scanned-id').innerText = currentQR;
        document.getElementById('observation').value = "";
        document.querySelectorAll('.btn-qty').forEach(b => b.classList.remove('active'));
        
        const actionButtons = document.getElementById('action-buttons');
        if (mode === 'entrada') {
            document.getElementById('action-label').innerText = "REGISTRAR ENTRADA";
            actionButtons.innerHTML = `<button onclick="sendData('entrada', this)" class="btn btn-success w-100 py-3 font-weight-bold">✅ CONFIRMAR ENTRADA</button>`;
        } else {
            document.getElementById('action-label').innerText = "GESTIONAR VIVIENDA";
            actionButtons.innerHTML = `
                <button onclick="sendData('salida', this)" class="btn btn-danger w-100 py-3 mb-2 font-weight-bold">📤 REGISTRAR SALIDA</button>
                <button onclick="sendData('incidencia', this)" class="btn btn-warning w-100 py-3 font-weight-bold text-dark">📝 ANOTAR INCIDENCIA</button>
            `;
        }
        showPanel('panel-confirm');
    }

    function setQty(n, element) {
        document.getElementById('manual-qty').value = n;
        document.querySelectorAll('.btn-qty').forEach(b => b.classList.remove('active'));
        if(element) element.classList.add('active');
    }

    async function sendData(action, btn) {
        const qty = document.getElementById('manual-qty').value;
        const obs = document.getElementById('observation').value;
        if(action !== 'incidencia' && (!qty || qty <= 0)) return alert("Indica cantidad válida");

        const txt = btn.innerText;
        btn.disabled = true; btn.innerText = "Enviando...";

        try {
            const response = await fetch(WEB_APP_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ qrId: currentQR, action: action, quantity: qty, observation: obs })
            });
            const result = await response.json();
            if (result.success) {
                updateStatus();
                showPanel('panel-start');
            } else { alert(result.msg); }
        } catch (e) { alert("Error de conexión"); }
        btn.disabled = false; btn.innerText = txt;
    }

    async function confirmCierre() {
        if (!confirm("¿Cerrar piscina? Se registrará la salida de todos.")) return;
        await fetch(WEB_APP_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "cierre" }) });
        updateStatus();
    }

    async function updateStatus() {
        try {
            const res = await fetch(WEB_APP_URL);
            const data = await res.json();
            document.getElementById('capacity-indicator').innerText = `${data.current} / ${data.max}`;
            document.getElementById('capacity-indicator').style.color = data.current >= data.max ? '#ff4d4d' : '#00d1ff';
            
            const list = document.getElementById('people-list');
            list.innerHTML = data.peopleInside.map(p => `
                <div class="list-group-item d-flex justify-content-between align-items-center p-3 shadow-sm" onclick="manageHousehold('${p.id}', ${p.qty})">
                    <div><span class="d-block small text-secondary">Vivienda</span><strong>${p.id}</strong></div>
                    <span class="badge bg-primary badge-qty rounded-pill">${p.qty}</span>
                </div>
            `).join('') || '<div class="text-center text-muted py-4 small">No hay nadie en la piscina</div>';
        } catch(e) {}
    }

    updateStatus();
    setInterval(updateStatus, 60000);
</script>
</body>
</html>
