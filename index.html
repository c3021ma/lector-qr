<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background-color: #f8f9fa; }
        .container { width: 90%; max-width: 500px; text-align: center; }
        #reader { border: none; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); background: white; }
        #resultado { margin-top: 20px; padding: 20px; background: white; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); word-break: break-all; min-height: 50px; }
        h1 { color: #333; font-size: 1.5rem; }
    </style>
</head>
<body>
 
    <div class="container">
        <h1>Escáner QR</h1>
        <div id="reader"></div>
        <div id="resultado">Esperando código...</div>
    </div>
 
    <script src="https://unpkg.com"></script>
    <script>
        // Lógica del Escáner
        function onScanSuccess(decodedText) {
            document.getElementById('resultado').innerHTML = `<strong>Resultado:</strong> <br> ${decodedText}`;
            if (decodedText.startsWith("http")) {
                if(confirm("¿Deseas abrir este enlace? \n" + decodedText)) {
                    window.location.href = decodedText;
                }
            }
        }
 
        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
 
        // Registro del Service Worker para PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
</body>
</html>
