<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Final Fix</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #fafafa; }
        #reader { width: 100%; max-width: 400px; margin: auto; background: #000; min-height: 300px; border-radius: 10px; }
        .btn { padding: 15px 25px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        #status { margin-top: 20px; padding: 10px; color: #555; }
    </style>
</head>
<body>
    <h1>Lector QR Pro</h1>
    <button id="start-btn" class="btn">ENCENDER CÁMARA</button>
    <div id="reader"></div>
    <div id="status">Estado: Listo</div>

    <!-- Usamos una versión específica de la librería para evitar fallos de carga -->
    <script src="https://unpkg.com"></script>
    
    <script>
        const status = document.getElementById('status');
        const startBtn = document.getElementById('start-btn');
        let scanner;

        startBtn.addEventListener('click', () => {
            status.innerText = "Accediendo a hardware...";
            
            // 1. Creamos la instancia
            scanner = new Html5Qrcode("reader");

            // 2. Definimos qué pasa al leer
            const onScanSuccess = (text) => {
                alert("QR Detectado: " + text);
                if(text.startsWith("http")) window.location.href = text;
            };

            // 3. Arrancamos forzando la cámara trasera directamente sin preguntar lista
            // Esto evita que el navegador se quede "pensando" en la lista de cámaras
            scanner.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                onScanSuccess
            ).then(() => {
                status.innerText = "Escaneando en tiempo real...";
                startBtn.style.display = "none";
            }).catch(err => {
                status.innerText = "Error crítico: " + err;
                console.error(err);
                // Si la trasera falla, intentamos con CUALQUIERA
                scanner.start({ facingMode: "user" }, { fps: 10, qrbox: 250 }, onScanSuccess);
            });
        });
    </script>
</body>
</html>
