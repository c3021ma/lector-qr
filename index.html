<div class="d-flex flex-wrap justify-content-center my-3">
    <button onclick="setQty(1)" class="btn btn-primary btn-qty">1</button>
    <button onclick="setQty(2)" class="btn btn-primary btn-qty">2</button>
    <button onclick="setQty(3)" class="btn btn-primary btn-qty">3</button>
    <button onclick="setQty(4)" class="btn btn-primary btn-qty">4</button>
    <button onclick="setQty(5)" class="btn btn-primary btn-qty">5</button>
    <button onclick="setQty(6)" class="btn btn-primary btn-qty">6</button>
    <button onclick="setQty(7)" class="btn btn-primary btn-qty">7</button>
    <button onclick="setQty(8)" class="btn btn-primary btn-qty">8</button>
    <button onclick="setQty(9)" class="btn btn-primary btn-qty">9</button>
</div>

<div class="mt-3">
    <label class="small text-secondary">Observaciones (opcional):</label>
    <textarea id="observation" class="form-control bg-dark text-white border-secondary" rows="2"></textarea>
</div>

<div class="mt-5 border-top pt-3">
    <button onclick="confirmCierre()" class="btn btn-outline-warning w-100 py-3">
        🌙 FINALIZAR JORNADA (Cierre)
    </button>
</div>

<script>
    // ... (Variables globales de antes) ...
    let peopleInsideData = [];

    async function updateStatus() {
        // ... (Fetch normal) ...
        const data = await res.json();
        peopleInsideData = data.peopleInside; // Guardamos para consultar límites localmente
        // ... (Renderizado de lista) ...
    }

    // Lógica para Salida: Limitar y Sugerir cantidad
    function quickExit(id) {
        currentQR = id;
        currentMode = 'salida';
        const info = peopleInsideData.find(p => p.id === id);
        const insideQty = info ? info.qty : 1;
        
        selectedQty = insideQty;
        document.getElementById('manual-qty').value = insideQty;
        document.getElementById('manual-qty').max = insideQty; // Limitamos el input
        
        document.getElementById('observation').value = ""; // Limpiar obs
        showStep3();
    }

    async function confirmCierre() {
        if (!confirm("¿Cerrar jornada? Se registrará la salida de todos los vecinos actuales indicando que se quedan al cierre.")) return;
        
        try {
            await fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({ action: "cierre" })
            });
            alert("Jornada cerrada correctamente.");
            updateStatus();
        } catch (e) { alert("Error al cerrar"); }
    }
</script>
