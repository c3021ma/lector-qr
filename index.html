<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aforo Piscina 2026</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f4f7f6; padding-bottom: 50px; }
        #reader { width: 100%; max-width: 400px; margin: auto; border-radius: 15px; overflow: hidden; }
        .capacity-badge { font-size: 2rem; font-weight: bold; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .status-in { background: #d4edda; color: #155724; }
        .status-full { background: #f8d7da; color: #721c24; }
        .person-card { cursor: pointer; transition: 0.2s; }
        .person-card:hover { background: #e9ecef; }
    </style>
</head>
<body>

<div class="container mt-4 text-center">
    <h2 class="mb-3">Aforo Piscina 2026</h2>
    
    <div id="capacity-indicator" class="capacity-badge status-in">
        Cargando...
    </div>

    <div class="btn-group w-100 mb-4" role="group">
        <input type="radio" class="btn-check" name="mode" id="mode-in" value="entrada" checked>
        <label class="btn btn-outline-primary p-3" for="mode-in">📥 ENTRADA</label>
        
        <input type="radio" class="btn-check" name="mode" id="mode-out" value="salida">
        <label class="btn btn-outline-danger p-3" for="mode-out">📤 SALIDA</label>
    </div>

    <div id="reader-container">
        <div id="reader"></div>
        <p class="text-muted mt-2">Enfoca el código QR del carnet</p>
    </div>

    <div id="list-container" class="mt-4" style="display:none;">
        <h4>Personas en el recinto</h4>
        <div id="people-list" class="list-group mt-3 text-start">
            </div>
    </div>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
    // URL DE TU SCRIPT DE GOOGLE (Cópiala de 'Implementar Web App')
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxBKWW6jbhSBxGajkLiHKA88k-T8uO9XK13AfQqLxAi6giKydPuNzHPPVWXxyabFlI/exec";
    
    let currentMode = "entrada";
    let html5QrCode = new Html5Qrcode("reader");

    // Cambiar entre escanear y lista al cambiar modo
    document.querySelectorAll('input[name="mode"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
            currentMode = e.target.value;
            document.getElementById('list-container').style.display = currentMode === "salida" ? "block" : "none";
            document.getElementById('reader-container').style.display = currentMode === "entrada" ? "block" : "none";
            if(currentMode === "entrada") startCamera();
        });
    });

    // Función para registrar acción en Google Sheets
    async function registerAction(qrId, action) {
        try {
            const response = await fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({ qrId, action })
            });
            const result = await response.json();
            if (result.success) {
                alert(`${action.toUpperCase()} registrada: ${qrId}`);
                updateStatus();
            } else {
                alert("ERROR: " + result.msg);
            }
        } catch (e) {
            console.error(e);
            alert("Error de conexión con el servidor");
        }
    }

    // Actualizar datos del servidor
    async function updateStatus() {
        const res = await fetch(WEB_APP_URL);
        const data = await res.json();
        
        const badge = document.getElementById('capacity-indicator');
        badge.innerText = `${data.current} / ${data.max}`;
        badge.className = `capacity-badge ${data.current >= data.max ? 'status-full' : 'status-in'}`;
        
        // Actualizar lista de salida
        const list = document.getElementById('people-list');
        list.innerHTML = data.peopleInside.map(id => `
            <div class="list-group-item person-card d-flex justify-content-between align-items-center" onclick="registerAction('${id}', 'salida')">
                <span>ID: ${id}</span>
                <span class="badge bg-danger rounded-pill">Dar salida</span>
            </div>
        `).join('') || '<p class="text-center">No hay nadie dentro</p>';
    }

    function startCamera() {
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            registerAction(text, currentMode);
        }).catch(err => console.error(err));
    }

    // Inicio
    updateStatus();
    startCamera();
</script>
</body>
</html>
