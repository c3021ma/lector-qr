<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aforo Piscina 2026</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #121212; color: white; font-family: sans-serif; }
        .card { background: #1e1e1e; border: none; border-radius: 15px; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; display: none; margin-bottom: 20px; }
        .capacity-number { font-size: 3.5rem; font-weight: 800; }
        .btn-qty { width: 60px; height: 60px; font-size: 1.5rem; border-radius: 10px; margin: 5px; }
        .step-panel { display: none; }
        .step-active { display: block; }
        .list-group-item { background: #2a2a2a; color: white; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="container py-4 text-center">
    <div class="card p-3 mb-4 shadow">
        <h5 class="text-secondary mb-0">AFORO ACTUAL</h5>
        <div id="capacity-indicator" class="capacity-number text-primary">-- / --</div>
    </div>

    <div id="panel-start" class="step-panel step-active">
        <div class="row g-3">
            <div class="col-6">
                <button onclick="openScanner('entrada')" class="btn btn-success w-100 py-4 shadow">
                    <h2 class="mb-0">📥</h2><b>ENTRADA</b>
                </button>
            </div>
            <div class="col-6">
                <button onclick="openScanner('salida')" class="btn btn-danger w-100 py-4 shadow">
                    <h2 class="mb-0">📤</h2><b>SALIDA</b>
                </button>
            </div>
        </div>
        
        <div class="mt-4 text-start">
            <h6>Personas en el recinto:</h6>
            <div id="people-list" class="list-group"></div>
        </div>
    </div>

    <div id="panel-scan" class="step-panel">
        <h4 id="scan-title">Escaneando...</h4>
        <div id="reader"></div>
        <button onclick="goBack()" class="btn btn-outline-light w-100">Cancelar</button>
    </div>

    <div id="panel-confirm" class="step-panel">
        <div class="card p-4">
            <h5 class="text-info">Código: <span id="scanned-id" class="text-white"></span></h5>
            <p class="mt-2">¿Cuántas personas van a <span id="action-label"></span>?</p>
            
            <div class="d-flex flex-wrap justify-content-center my-3">
                <button onclick="setQty(1)" class="btn btn-primary btn-qty">1</button>
                <button onclick="setQty(2)" class="btn btn-primary btn-qty">2</button>
                <button onclick="setQty(3)" class="btn btn-primary btn-qty">3</button>
                <button onclick="setQty(4)" class="btn btn-primary btn-qty">4</button>
                <button onclick="setQty(5)" class="btn btn-primary btn-qty">5</button>
                <button onclick="setQty(6)" class="btn btn-primary btn-qty">6</button>
            </div>
            
            <div class="mt-2">
                <small>O introduce un número manual:</small>
                <input type="number" id="manual-qty" class="form-control text-center bg-dark text-white border-secondary mt-1" value="1">
            </div>

            <button onclick="sendData()" class="btn btn-success w-100 mt-4 py-3">CONFIRMAR REGISTRO</button>
            <button onclick="goBack()" class="btn btn-link text-secondary mt-2">Volver a escanear</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxBKWW6jbhSBxGajkLiHKA88k-T8uO9XK13AfQqLxAi6giKydPuNzHPPVWXxyabFlI/exec";
    
    let html5QrCode = new Html5Qrcode("reader");
    let currentMode = "";
    let currentQR = "";
    let selectedQty = 1;

    // Navegación entre paneles
    function showPanel(id) {
        document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('step-active'));
        document.getElementById(id).classList.add('step-active');
    }

    function goBack() {
        if(html5QrCode.isScanning) html5QrCode.stop();
        showPanel('panel-start');
    }

    // Iniciar Escáner
    function openScanner(mode) {
        currentMode = mode;
        document.getElementById('scan-title').innerText = mode === 'entrada' ? "Escaneando Entrada" : "Escaneando Salida";
        document.getElementById('reader').style.display = 'block';
        showPanel('panel-scan');

        html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: 250 },
            (decodedText) => {
                currentQR = decodedText;
                html5QrCode.stop().then(() => {
                    document.getElementById('reader').style.display = 'none';
                    showStep3();
                });
            }
        ).catch(err => alert("Error cámara: " + err));
    }

    function showStep3() {
        document.getElementById('scanned-id').innerText = currentQR;
        document.getElementById('action-label').innerText = currentMode === 'entrada' ? 'entrar' : 'salir';
        showPanel('panel-confirm');
    }

    function setQty(n) {
        selectedQty = n;
        document.getElementById('manual-qty').value = n;
        // Efecto visual simple
        document.querySelectorAll('.btn-qty').forEach(b => b.classList.replace('btn-info', 'btn-primary'));
        event.target.classList.replace('btn-primary', 'btn-info');
    }

    // Enviar a Google
    async function sendData() {
        const qty = document.getElementById('manual-qty').value;
        const btn = event.target;
        btn.disabled = true;
        btn.innerText = "Enviando...";

        try {
            const response = await fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({ qrId: currentQR, action: currentMode, quantity: qty })
            });
            const result = await response.json();
            if (result.success) {
                alert("Registro completado con éxito");
                updateStatus();
                showPanel('panel-start');
            } else {
                alert("Error: " + result.msg);
            }
        } catch (e) {
            alert("Error de conexión");
        } finally {
            btn.disabled = false;
            btn.innerText = "CONFIRMAR REGISTRO";
        }
    }

    // Actualizar aforo y lista
    async function updateStatus() {
        try {
            const res = await fetch(WEB_APP_URL);
            const data = await res.json();
            
            const badge = document.getElementById('capacity-indicator');
            badge.innerText = `${data.current} / ${data.max}`;
            badge.style.color = data.current >= data.max ? '#ff4444' : '#00d1ff';
            
            const list = document.getElementById('people-list');
            list.innerHTML = data.peopleInside.map(p => `
                <div class="list-group-item d-flex justify-content-between align-items-center" onclick="quickExit('${p.id}')">
                    <span>🏠 ID: ${p.id}</span>
                    <span class="badge bg-primary rounded-pill">${p.qty} pers.</span>
                </div>
            `).join('') || '<div class="text-center text-muted p-3">Recinto vacío</div>';
        } catch(e) {}
    }

    function quickExit(id) {
        currentQR = id;
        currentMode = 'salida';
        showStep3();
    }

    // Inicio
    updateStatus();
</script>
</body>
</html>
